<!DOCTYPE html>
<html>
<head>
  <title>Time Attack — Typing Racer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
  <h2>Typing Racer</h2>
  <div>
    <a href="/">Home</a>
    <a href="/leaderboard">Leaderboard</a>
  </div>
</nav>

<div style="max-width:640px;margin:48px auto;padding:0 24px;" class="fade-up">
  <div style="background:var(--surface-1);border:1px solid var(--border);border-radius:24px;padding:40px;text-align:center;">
    <div style="display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--accent-dim);border:1px solid rgba(59,130,246,0.3);border-radius:9999px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent-bright);margin-bottom:16px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Time Attack — 30 Seconds
    </div>

    <div id="timer">30</div>

    <textarea id="box" placeholder="Start typing to begin the timer..." oninput="startTimeAttack()"></textarea>

    <div id="result" style="display:none;margin-top:24px;padding:20px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;">
      <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Words Typed</div>
      <div id="wordCount" style="font-size:36px;font-weight:800;letter-spacing:-0.03em;color:var(--text-primary);"></div>
    </div>

    <div style="display:flex;gap:12px;margin-top:20px;">
      <button onclick="location.reload()" style="flex:1;background:var(--surface-2);color:var(--text-secondary);border:1px solid var(--border);">
        Reset
      </button>
      <a href="/" style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;background:var(--accent);color:#fff;border-radius:6px;text-decoration:none;font-size:14px;font-weight:600;">
        Back to Race
      </a>
    </div>
  </div>
</div>

<script>
let time = 30;
let started = false;
let interval;

function startTimeAttack() {
  if (!started) {
    started = true;
    interval = setInterval(() => {
      time--;
      const el = document.getElementById("timer");
      el.textContent = time;
      if (time <= 10) el.classList.add('urgent');
      if (time <= 0) {
        clearInterval(interval);
        document.getElementById("box").disabled = true;
        const words = document.getElementById("box").value.trim().split(/\s+/).filter(w => w).length;
        document.getElementById("wordCount").textContent = words;
        document.getElementById("result").style.display = "block";
      }
    }, 1000);
  }
}
</script>
</body>
</html>
