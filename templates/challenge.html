<!DOCTYPE html>
<html>
<head>
  <title>Daily Challenge — Typing Racer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
  <h2>Typing Racer</h2>
  <div>
    <a href="/">Home</a>
    <a href="/leaderboard">Leaderboard</a>
  </div>
</nav>

<div style="max-width:480px;margin:80px auto;padding:0 24px;" class="fade-up">
  <div style="background:var(--surface-1);border:1px solid var(--border);border-radius:24px;padding:48px;text-align:center;">
    <div style="display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);border-radius:9999px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--amber);margin-bottom:24px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      Daily Challenge
    </div>
    <p id="challengeText" style="font-size:20px;font-weight:600;color:var(--text-primary);margin:0 0 32px;letter-spacing:-0.02em;"></p>
    <button onclick="complete()" style="width:100%;padding:14px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Mark Complete
    </button>
    <a href="/" style="display:block;margin-top:16px;font-size:13px;color:var(--text-muted);text-decoration:none;">← Back to Race</a>
  </div>
</div>

<script>
const challenges = [
  "Reach 40 WPM in a race",
  "Type continuously for 2 minutes",
  "Achieve 90% accuracy or higher",
  "Complete 3 races in a row"
];
const today = new Date().getDate();
document.getElementById("challengeText").innerText = challenges[today % challenges.length];

function complete() {
  const btn = document.querySelector('button');
  btn.textContent = '✓ Completed!';
  btn.style.background = 'var(--green)';
  btn.disabled = true;
}
</script>
</body>
</html>
